# Publish @rarecloudio/mcp-server to npm on tags like v0.1.1.
# npm TRUSTED PUBLISHING (OIDC): no tokens, no secrets; npm verifies the
# release comes from THIS repo + THIS workflow, and issues provenance.
# package.json version must match the tag (v prefix stripped).
name: publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # NOTE: no registry-url here! setup-node would write an .npmrc auth line
      # with a placeholder NODE_AUTH_TOKEN, and npm then uses that instead of
      # the OIDC exchange (observed live: unauthenticated PUT -> 404). With a
      # clean environment, npm@latest performs trusted publishing on its own.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm publish
